<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDU 학술부 - 항공사 기출문제</title>
    <style>
        :root[data-theme="light"] { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333; --border: #ddd; }
        :root[data-theme="dark"] { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #eee; --border: #444; }

        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }

        /* 인트로 화면 */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        #logo-btn { width: 300px; cursor: pointer; transition: 0.3s; }
        #logo-btn:hover { transform: scale(1.05); }

        /* 메인 화면 */
        #main-content { display:none; width: 100%; flex-direction: column; align-items: center; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 30px; position: relative; max-width: 600px; width: 100%; }
        h1 { margin: 0; font-size: 2.5em; }
        .sub-title { font-size: 1.3em; color: #888; margin-top: 5px; }
        .settings-icon { position: absolute; top: 10px; right: 0; cursor: pointer; font-size: 24px; }

        .card { background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin-bottom: 20px; }
        select { padding: 10px; width: 100%; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-color); }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }

        /* 하단 로고 슬라이드 애니메이션 */
        .marquee-container { width: 100%; max-width: 800px; overflow: hidden; margin-top: 50px; padding: 20px 0; border-top: 1px solid var(--border); }
        .marquee-track { display: flex; gap: 60px; animation: scroll 25s linear infinite; white-space: nowrap; align-items: center; }
        .marquee-track img { height: 45px; object-fit: contain; } /* 로고 높이를 45px로 고정하여 평행하게 맞춤 */

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; }
        .config-group { margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img id="logo-btn" src="KakaoTalk_20260522_000027464.png" onclick="startApp()" alt="대학교 로고">
        <p style="margin-top: 20px; font-size: 1.1em; color: #555; font-weight: bold;">로고를 클릭하여 시작하세요</p>
    </div>

    <div id="main-content">
        <header>
            <h1>CDU 학술부</h1>
            <div class="sub-title">(항공사 기출 문제)</div>
            <div class="settings-icon" onclick="toggleModal()">⚙️</div>
        </header>

        <div class="card">
            <h3>설정 선택</h3>
            <label>항공사:</label>
            <select id="airline-select" onchange="updateYearOptions()"></select>
            <label>연도 및 차수:</label>
            <select id="year-select"></select>
            <button class="btn" style="background:#007bff;">✏️ 한 문제씩 학습 모드</button>
            <button class="btn" style="background:#28a745;">⏱️ 실전 모의고사 모드</button>
        </div>

        <div class="marquee-container">
            <div class="marquee-track">
                <img src="JEJU AIR.png" alt="제주항공">
                <img src="EASTAR JET.png" alt="이스타항공">
                <img src="KOREAN AIR.png" alt="대한항공">
                <img src="T WAY.jpg" alt="티웨이항공">
                <img src="AIR INCHEON.jpg" alt="에어인천">
                <img src="JINAIR.png" alt="진에어">
                <img src="ASIANA AIRLINES.png" alt="아시아나항공">
                <img src="AIRSEOUL.jpg" alt="에어서울">
                <img src="JEJU AIR.png" alt="제주항공">
                <img src="EASTAR JET.png" alt="이스타항공">
                <img src="KOREAN AIR.png" alt="대한항공">
                <img src="T WAY.jpg" alt="티웨이항공">
            </div>
        </div>
    </div>

    <script>
        function startApp() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        }

        const airlineData = {
            JejuAir: ["2016년 1차", "2017년 1차", "2017년 2차", "2017년 3차", "2018년 1차", "2018년 2차", "2025년 1차"],
            EastarJet: ["2016년 1차"],
            KoreanAir: ["연도 불명 1차", "연도 불명 2차", "연도 불명 3차", "연도 불명 4차", "연도 불명 5차", "연도 불명 6차", "연도 불명 7차", "연도 불명 8차", "연도 불명 9차", "연도 불명 10차", "2025년 1차", "2025년 2차"],
            TwayAir: ["2015년 1차", "2015년 2차", "2017년 1차", "2017년 2차", "2018년 1차", "2018년 2차", "2024년 1차", "연도 불명 1차", "연도 불명 2차", "연도 불명 3차"],
            AirIncheon: ["2024년 2차", "연도 불명 1차"],
            JinAir: ["2025년 1차"],
            Asiana: ["2018년 1차"],
            AirSeoul: ["연도 불명 1차"]
        };

        // 로드 시 항공사 옵션 생성
        const airlineSelect = document.getElementById('airline-select');
        Object.keys(airlineData).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = key;
            airlineSelect.appendChild(opt);
        });

        function updateYearOptions() {
            const airline = airlineSelect.value;
            const select = document.getElementById('year-select');
            select.innerHTML = airlineData[airline].map(y => `<option value="${y}">${y}</option>`).join('');
        }
        updateYearOptions();
    </script>
</body>
</html>
